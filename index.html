<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Roblox-стиль: Прыжки по платформам</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
        /* Панель со статистикой слева */
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
            font-size: 14px; pointer-events: none;
        }
        #score { font-size: 20px; font-weight: bold; color: #ffeb3b; }
        #coins { font-size: 20px; font-weight: bold; color: #FFD700; margin-top: 5px; }
        /* Кнопка магазина справа сверху */
        #shopBtn {
            position: absolute; top: 10px; right: 10px;
            background: linear-gradient(135deg, #FFD700, #FFA000);
            color: #333; border: none; padding: 12px 20px;
            font-size: 16px; font-weight: bold; border-radius: 8px;
            cursor: pointer; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }
        #shopBtn:hover { transform: scale(1.05); }
        #shopBtn:active { transform: scale(0.95); }
        /* Панель магазина */
        #shop {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 40, 0.95); color: white;
            padding: 25px; border-radius: 12px; min-width: 320px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 2px solid #FFD700;
        }
        #shop h2 { margin: 0 0 15px 0; text-align: center; color: #FFD700; }
        .shop-item {
            background: rgba(255,255,255,0.1); padding: 12px;
            border-radius: 8px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .shop-item-info { flex: 1; }
        .shop-item-name { font-weight: bold; font-size: 16px; }
        .shop-item-desc { font-size: 12px; color: #aaa; margin-top: 3px; }
        .shop-item-level { font-size: 12px; color: #4CAF50; margin-top: 3px; }
        .buy-btn {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white; border: none; padding: 8px 16px;
            border-radius: 6px; cursor: pointer; font-weight: bold;
            min-width: 100px;
        }
        .buy-btn:disabled {
            background: #555; cursor: not-allowed; color: #999;
        }
        .buy-btn:not(:disabled):hover { filter: brightness(1.1); }
        #closeShop {
            background: #f44336; color: white; border: none;
            padding: 8px 16px; border-radius: 6px; cursor: pointer;
            width: 100%; margin-top: 10px; font-weight: bold;
        }
        /* Сообщение о рестарте */
        #restartMsg {
            display: none; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); color: white; font-size: 32px;
            font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        /* Всплывающее уведомление о монете */
        .coin-popup {
            position: absolute; color: #FFD700; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none; animation: floatUp 1s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-60px); opacity: 0; }
        }
    </style>
</head>
<body>
    <!-- Левая панель со статистикой -->
    <div id="ui">
        <div id="score">Платформы: 0</div>
        <div id="coins">🪙 Монеты: 0</div>
        <div style="margin-top: 8px; font-size: 12px;">
            WASD / Стрелки — движение<br>
            ПРОБЕЛ — прыжок<br>
            Не упади вниз!
        </div>
    </div>

    <!-- Кнопка магазина -->
    <button id="shopBtn">🛒 Магазин</button>

    <!-- Панель магазина -->
    <div id="shop">
        <h2>🛒 Магазин улучшений</h2>
        <div class="shop-item">
            <div class="shop-item-info">
                <div class="shop-item-name">⚡ Скорость</div>
                <div class="shop-item-desc">Увеличивает скорость бега</div>
                <div class="shop-item-level" id="speedLevel">Уровень: 0</div>
            </div>
            <button class="buy-btn" id="buySpeed">🪙 10</button>
        </div>
        <div class="shop-item">
            <div class="shop-item-info">
                <div class="shop-item-name">🦘 Прыжок</div>
                <div class="shop-item-desc">Увеличивает высоту прыжка</div>
                <div class="shop-item-level" id="jumpLevel">Уровень: 0</div>
            </div>
            <button class="buy-btn" id="buyJump">🪙 10</button>
        </div>
        <button id="closeShop">Закрыть</button>
    </div>

    <div id="restartMsg">РЕСТАРТ!</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
        // ==================== НАСТРОЙКА СЦЕНЫ ====================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 30, 120);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // ==================== ОСВЕЩЕНИЕ ====================
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
        sunLight.position.set(20, 40, 20);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.left = -50;
        sunLight.shadow.camera.right = 50;
        sunLight.shadow.camera.top = 50;
        sunLight.shadow.camera.bottom = -50;
        scene.add(sunLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // ==================== ПЕРСОНАЖ (ДЕТАЛЬНАЯ ПРОРАБОТКА) ====================
        const player = new THREE.Group();
        
        // Материалы
        const skinMat = new THREE.MeshLambertMaterial({ color: 0xffcc99 }); // кожа
        const shirtMat = new THREE.MeshLambertMaterial({ color: 0x2196F3 }); // синяя футболка
        const pantsMat = new THREE.MeshLambertMaterial({ color: 0x3f51b5 }); // синие штаны
        const shoeMat = new THREE.MeshLambertMaterial({ color: 0x222222 }); // чёрные ботинки
        const hatMat = new THREE.MeshLambertMaterial({ color: 0xE53935 }); // красная шапка
        const eyeWhiteMat = new THREE.MeshBasicMaterial({ color: 0xffffff }); // белки глаз
        const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 }); // зрачки
        const browMat = new THREE.MeshBasicMaterial({ color: 0x3e2723 }); // брови
        const backpackMat = new THREE.MeshLambertMaterial({ color: 0x8D6E63 }); // рюкзак
        const beltMat = new THREE.MeshLambertMaterial({ color: 0x4E342E }); // пояс
        const logoMat = new THREE.MeshBasicMaterial({ color: 0xFFEB3B }); // жёлтый значок

        // --- ГОЛОВА ---
        const head = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), skinMat);
        head.position.y = 2.5; head.castShadow = true; player.add(head);

        // Белки глаз
        const leftEyeWhite = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.22, 0.05), eyeWhiteMat);
        leftEyeWhite.position.set(-0.2, 2.55, 0.51); player.add(leftEyeWhite);
        const rightEyeWhite = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.22, 0.05), eyeWhiteMat);
        rightEyeWhite.position.set(0.2, 2.55, 0.51); player.add(rightEyeWhite);

        // Зрачки (чуть меньше, поверх белков)
        const leftPupil = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.06), pupilMat);
        leftPupil.position.set(-0.2, 2.55, 0.54); player.add(leftPupil);
        const rightPupil = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.06), pupilMat);
        rightPupil.position.set(0.2, 2.55, 0.54); player.add(rightPupil);

        // Брови (над глазами)
        const leftBrow = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.06, 0.05), browMat);
        leftBrow.position.set(-0.2, 2.7, 0.51); player.add(leftBrow);
        const rightBrow = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.06, 0.05), browMat);
        rightBrow.position.set(0.2, 2.7, 0.51); player.add(rightBrow);

        // Улыбка
        const smile = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.08, 0.05), pupilMat);
        smile.position.set(0, 2.3, 0.51); player.add(smile);

        // --- ШАПКА (бейсболка) ---
        // Основа шапки
        const hatTop = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.3, 1.05), hatMat);
        hatTop.position.y = 3.15; hatTop.castShadow = true; player.add(hatTop);
        // Козырёк
        const hatBrim = new THREE.Mesh(new THREE.BoxGeometry(1.05, 0.08, 0.4), hatMat);
        hatBrim.position.set(0, 3.0, 0.6); hatBrim.castShadow = true; player.add(hatBrim);

        // --- ТОРС ---
        const torso = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.4, 0.7), shirtMat);
        torso.position.y = 1.3; torso.castShadow = true; player.add(torso);

        // Жёлтый значок на футболке (звезда/круг)
        const logo = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 0.05), logoMat);
        logo.position.set(0, 1.5, 0.36); player.add(logo);

        // Пояс
        const belt = new THREE.Mesh(new THREE.BoxGeometry(1.22, 0.15, 0.72), beltMat);
        belt.position.y = 0.6; belt.castShadow = true; player.add(belt);
        // Пряжка пояса
        const buckle = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.05), logoMat);
        buckle.position.set(0, 0.6, 0.37); player.add(buckle);

        // --- РУКИ ---
        const leftArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.4, 0.7), shirtMat);
        leftArm.position.set(-0.8, 1.3, 0); leftArm.castShadow = true; player.add(leftArm);
        const rightArm = new THREE.Mesh(new THREE.BoxGeometry(0.4, 1.4, 0.7), shirtMat);
        rightArm.position.set(0.8, 1.3, 0); rightArm.castShadow = true; player.add(rightArm);

        // Кисти рук (кожа, снизу рукава)
        const leftHand = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.7), skinMat);
        leftHand.position.set(-0.8, 0.45, 0); leftHand.castShadow = true; player.add(leftHand);
        const rightHand = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.3, 0.7), skinMat);
        rightHand.position.set(0.8, 0.45, 0); rightHand.castShadow = true; player.add(rightHand);

        // --- НОГИ ---
        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.2, 0.7), pantsMat);
        leftLeg.position.set(-0.3, 0, 0); leftLeg.castShadow = true; player.add(leftLeg);
        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(0.55, 1.2, 0.7), pantsMat);
        rightLeg.position.set(0.3, 0, 0); rightLeg.castShadow = true; player.add(rightLeg);

        // Ботинки
        const leftShoe = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.25, 0.85), shoeMat);
        leftShoe.position.set(-0.3, -0.7, 0.05); leftShoe.castShadow = true; player.add(leftShoe);
        const rightShoe = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.25, 0.85), shoeMat);
        rightShoe.position.set(0.3, -0.7, 0.05); rightShoe.castShadow = true; player.add(rightShoe);

        // --- РЮКЗАК за спиной ---
        const backpack = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.0, 0.4), backpackMat);
        backpack.position.set(0, 1.4, -0.55); backpack.castShadow = true; player.add(backpack);
        // Карман на рюкзаке
        const backpackPocket = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.05), beltMat);
        backpackPocket.position.set(0, 1.15, -0.76); player.add(backpackPocket);

        scene.add(player);

        // ==================== ПЛАТФОРМЫ ====================
        const platforms = [];
        const platformColors = [0x4CAF50, 0xFF9800, 0xE91E63, 0x9C27B0, 0x00BCD4, 0xFFEB3B];

        function createPlatform(x, y, z, size = 4) {
            const color = platformColors[Math.floor(Math.random() * platformColors.length)];
            const geo = new THREE.BoxGeometry(size, 1, size);
            const mat = new THREE.MeshLambertMaterial({ color: color });
            const platform = new THREE.Mesh(geo, mat);
            platform.position.set(x, y, z);
            platform.receiveShadow = true;
            platform.castShadow = true;
            scene.add(platform);
            platforms.push(platform);
            return platform;
        }

        const startPlatform = createPlatform(0, 0, 0, 6);
        startPlatform.userData.isStart = true;

        function generatePathFrom(x, y, z, count = 30) {
            let lx = x, ly = y, lz = z;
            for (let i = 0; i < count; i++) {
                const dx = (Math.random() - 0.5) * 3;
                const dy = Math.random() * 1.0;
                const dz = 9 + Math.random() * 2;
                lx += dx; ly += dy; lz += dz;
                createPlatform(lx, ly, lz, 5 + Math.random() * 2);
            }
        }

        generatePathFrom(0, 0, 0, 30);

        // ==================== ОБЛАКА ====================
        const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
        for (let i = 0; i < 20; i++) {
            const cloud = new THREE.Group();
            for (let j = 0; j < 5; j++) {
                const puff = new THREE.Mesh(new THREE.SphereGeometry(1 + Math.random(), 8, 8), cloudMat);
                puff.position.set(j * 1.2 - 2, Math.random() * 0.5, Math.random() * 0.5);
                cloud.add(puff);
            }
            cloud.position.set((Math.random() - 0.5) * 150, 15 + Math.random() * 20, Math.random() * 200);
            scene.add(cloud);
        }

        // ==================== ФИЗИКА, УПРАВЛЕНИЕ И НАГРАДЫ ====================
        const playerState = {
            velocity: new THREE.Vector3(0, 0, 0),
            onGround: false,
            score: 0,
            coins: 0,                 // ⭐ Монеты
            visitedPlatforms: new Set(),
            upgrades: {               // ⭐ Уровни улучшений
                speed: 0,
                jump: 0
            }
        };

        player.position.set(0, 1.6, 0);

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        const GRAVITY = -25;
        // Базовые значения (без улучшений)
        const BASE_SPEED = 10;
        const BASE_JUMP = 13;
        const UPGRADE_COST = 10;      // Стоимость одного улучшения
        const SPEED_PER_LEVEL = 1.5;  // Прибавка к скорости за уровень
        const JUMP_PER_LEVEL = 1.0;   // Прибавка к прыжку за уровень

        // Функции получения текущих значений с учётом улучшений
        function getMoveSpeed() { return BASE_SPEED + playerState.upgrades.speed * SPEED_PER_LEVEL; }
        function getJumpForce() { return BASE_JUMP + playerState.upgrades.jump * JUMP_PER_LEVEL; }

        const cameraDirection = new THREE.Vector3();

        // ==================== КАМЕРА ====================
        function updateCamera() {
            const offset = new THREE.Vector3(0, 5, -10);
            const target = player.position.clone().add(offset);
            camera.position.lerp(target, 0.1);
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
            camera.getWorldDirection(cameraDirection);
            cameraDirection.y = 0;
            cameraDirection.normalize();
        }

        // ==================== СТОЛКНОВЕНИЯ + МОНЕТЫ ====================
        function checkPlatformCollision() {
            playerState.onGround = false;
            const playerBottom = player.position.y - 0.6;
            
            for (const plat of platforms) {
                const platTop = plat.position.y + 0.5;
                const dx = Math.abs(player.position.x - plat.position.x);
                const dz = Math.abs(player.position.z - plat.position.z);
                const halfSize = plat.geometry.parameters.width / 2;
                
                if (dx < halfSize && dz < halfSize) {
                    if (playerBottom <= platTop && playerBottom >= platTop - 0.5 && playerState.velocity.y <= 0) {
                        player.position.y = platTop + 0.6;
                        playerState.velocity.y = 0;
                        playerState.onGround = true;
                        
                        // ⭐ Награда: +1 монета за каждую новую платформу
                        if (!playerState.visitedPlatforms.has(plat)) {
                            playerState.visitedPlatforms.add(plat);
                            playerState.score++;
                            playerState.coins++;
                            document.getElementById('score').textContent = 'Платформы: ' + playerState.score;
                            document.getElementById('coins').textContent = '🪙 Монеты: ' + playerState.coins;
                            showCoinPopup();
                            updateShopButtons(); // Обновляем доступность кнопок магазина
                        }
                    }
                }
            }
        }

        // ⭐ Всплывающее уведомление "+1 🪙"
        function showCoinPopup() {
            const popup = document.createElement('div');
            popup.className = 'coin-popup';
            popup.textContent = '+1 🪙';
            popup.style.left = '120px';
            popup.style.top = '80px';
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        // ==================== ГЕНЕРАЦИЯ И УДАЛЕНИЕ ====================
        function managePlatforms() {
            let farthest = platforms[platforms.length - 1];
            if (player.position.z > farthest.position.z - 40) {
                let lx = farthest.position.x, ly = farthest.position.y, lz = farthest.position.z;
                for (let i = 0; i < 10; i++) {
                    lx += (Math.random() - 0.5) * 3;
                    ly += Math.random() * 1.0;
                    lz += 9 + Math.random() * 2;
                    createPlatform(lx, ly, lz, 5 + Math.random() * 2);
                }
            }
            
            for (let i = 0; i < platforms.length; i++) {
                if (!platforms[i].userData.isStart && platforms[i].position.z < player.position.z - 30) {
                    scene.remove(platforms[i]);
                    platforms[i].geometry.dispose();
                    platforms[i].material.dispose();
                    platforms.splice(i, 1);
                    i--;
                }
            }
        }

        // ==================== АНИМАЦИЯ ХОДЬБЫ ====================
        let walkTime = 0;
        function animateWalk(isMoving) {
            if (isMoving && playerState.onGround) {
                walkTime += 0.2;
                leftArm.rotation.x = Math.sin(walkTime) * 0.8;
                rightArm.rotation.x = -Math.sin(walkTime) * 0.8;
                leftLeg.rotation.x = -Math.sin(walkTime) * 0.8;
                rightLeg.rotation.x = Math.sin(walkTime) * 0.8;
                // Руки и кисти качаются синхронно
                leftHand.rotation.x = Math.sin(walkTime) * 0.8;
                rightHand.rotation.x = -Math.sin(walkTime) * 0.8;
                // Ботинки тоже
                leftShoe.rotation.x = -Math.sin(walkTime) * 0.8;
                rightShoe.rotation.x = Math.sin(walkTime) * 0.8;
            } else {
                const d = 0.8;
                leftArm.rotation.x *= d; rightArm.rotation.x *= d;
                leftLeg.rotation.x *= d; rightLeg.rotation.x *= d;
                leftHand.rotation.x *= d; rightHand.rotation.x *= d;
                leftShoe.rotation.x *= d; rightShoe.rotation.x *= d;
            }
        }

        // ==================== МАГАЗИН ====================
        const shopEl = document.getElementById('shop');
        const shopBtn = document.getElementById('shopBtn');
        const closeShopBtn = document.getElementById('closeShop');
        const buySpeedBtn = document.getElementById('buySpeed');
        const buyJumpBtn = document.getElementById('buyJump');
        const speedLevelEl = document.getElementById('speedLevel');
        const jumpLevelEl = document.getElementById('jumpLevel');

        shopBtn.addEventListener('click', () => {
            shopEl.style.display = 'block';
            updateShopButtons();
        });
        closeShopBtn.addEventListener('click', () => {
            shopEl.style.display = 'none';
        });

        // Обновление кнопок магазина (доступность и уровни)
        function updateShopButtons() {
            speedLevelEl.textContent = 'Уровень: ' + playerState.upgrades.speed + 
                ' (скорость: ' + getMoveSpeed().toFixed(1) + ')';
            jumpLevelEl.textContent = 'Уровень: ' + playerState.upgrades.jump + 
                ' (прыжок: ' + getJumpForce().toFixed(1) + ')';
            
            // Кнопка активна только если хватает монет
            buySpeedBtn.disabled = playerState.coins < UPGRADE_COST;
            buyJumpBtn.disabled = playerState.coins < UPGRADE_COST;
        }

        // Покупка улучшения скорости
        buySpeedBtn.addEventListener('click', () => {
            if (playerState.coins >= UPGRADE_COST) {
                playerState.coins -= UPGRADE_COST;
                playerState.upgrades.speed++;
                document.getElementById('coins').textContent = '🪙 Монеты: ' + playerState.coins;
                updateShopButtons();
            }
        });

        // Покупка улучшения прыжка
        buyJumpBtn.addEventListener('click', () => {
            if (playerState.coins >= UPGRADE_COST) {
                playerState.coins -= UPGRADE_COST;
                playerState.upgrades.jump++;
                document.getElementById('coins').textContent = '🪙 Монеты: ' + playerState.coins;
                updateShopButtons();
            }
        });

        // ==================== РЕСТАРТ ====================
        function doRestart() {
            const msg = document.getElementById('restartMsg');
            msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 1000);

            for (let i = platforms.length - 1; i >= 0; i--) {
                if (!platforms[i].userData.isStart) {
                    scene.remove(platforms[i]);
                    platforms[i].geometry.dispose();
                    platforms[i].material.dispose();
                    platforms.splice(i, 1);
                }
            }
            generatePathFrom(
                startPlatform.position.x,
                startPlatform.position.y,
                startPlatform.position.z,
                30
            );

            player.position.set(startPlatform.position.x, startPlatform.position.y + 1.6, startPlatform.position.z);
            playerState.velocity.set(0, 0, 0);
            player.rotation.y = 0;

            // ⭐ Сбрасываем только счёт платформ, монеты и улучшения сохраняются!
            playerState.score = 0;
            playerState.visitedPlatforms.clear();
            document.getElementById('score').textContent = 'Платформы: 0';

            const camOffset = new THREE.Vector3(0, 5, -10);
            camera.position.copy(player.position.clone().add(camOffset));
            camera.lookAt(player.position.x, player.position.y + 1.5, player.position.z);
            camera.getWorldDirection(cameraDirection);
            cameraDirection.y = 0;
            cameraDirection.normalize();
        }

        // ==================== ГЛАВНЫЙ ЦИКЛ ====================
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            const moveDir = new THREE.Vector3(0, 0, 0);
            const rightVector = new THREE.Vector3().crossVectors(cameraDirection, new THREE.Vector3(0, 1, 0)).normalize();
            
            if (keys['KeyW'] || keys['ArrowUp']) moveDir.add(cameraDirection);
            if (keys['KeyS'] || keys['ArrowDown']) moveDir.sub(cameraDirection);
            if (keys['KeyA'] || keys['ArrowLeft']) moveDir.sub(rightVector);
            if (keys['KeyD'] || keys['ArrowRight']) moveDir.add(rightVector);
            
            const isMoving = moveDir.length() > 0;
            if (isMoving) moveDir.normalize();

            if (isMoving) player.rotation.y = Math.atan2(moveDir.x, moveDir.z);

            // ⭐ Используем значения с учётом улучшений
            const currentSpeed = getMoveSpeed();
            const currentJump = getJumpForce();

            playerState.velocity.x = moveDir.x * currentSpeed;
            playerState.velocity.z = moveDir.z * currentSpeed;

            if (keys['Space'] && playerState.onGround) {
                playerState.velocity.y = currentJump;
                playerState.onGround = false;
            }

            playerState.velocity.y += GRAVITY * delta;
            player.position.x += playerState.velocity.x * delta;
            player.position.y += playerState.velocity.y * delta;
            player.position.z += playerState.velocity.z * delta;

            checkPlatformCollision();

            if (player.position.y < -20) {
                doRestart();
            }

            managePlatforms();
            animateWalk(isMoving);
            updateCamera();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Первоначальное обновление магазина
        updateShopButtons();

        animate();
    </script>
</body>
</html>
